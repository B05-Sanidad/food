<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>B05 – Traceability</title>
  <style>
    :root { --brand:#3A5C1E; --beige:#F1F1E6; }
    html { font-size:12px; }
    body { background:var(--beige); margin:0; font-family:Arial, sans-serif;
           min-height:100vh; display:flex; flex-direction:column; }
    header{padding:1rem 1.5rem;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.06);
           display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;}
    header h1{color:var(--brand);margin:0;font-weight:800;font-size:1.25rem;}
    .btn{border-radius:.6rem;padding:.4rem .8rem;font-weight:600;cursor:pointer;
         border:1px solid #e5e7eb;background:#fff;}
    .btn-brand{background:var(--brand);color:#fff;border-color:var(--brand);}
    main{padding:1rem 1.5rem 3rem;flex-grow:1;}
    .card{background:#fff;border-radius:1rem;box-shadow:0 8px 30px rgba(0,0,0,.06);
          max-width:1100px;margin:0 auto;padding:1rem;overflow-x:auto;}
    h3{margin:.5rem 0;color:#334155;}
    table{width:100%;border-collapse:separate;border-spacing:0;font-size:.85rem;margin-top:.5rem;}
    th,td{padding:.6rem .75rem;text-align:left;border-bottom:1px solid #e2e8f0;vertical-align:top;}
    th{position:sticky;top:0;background:#fafafa;font-weight:700;color:#475569;}
    .nowrap{white-space:nowrap;}
    #latestLotDate,#latestExpDate{color:red;font-weight:600;}
    @media print{header{display:none!important;}main{padding:0;}
      .card{box-shadow:none;margin:0;padding:0;}th{position:static;}}
  </style>
</head>
<body>
  <header>
    <h1 id="title">Cargando…</h1>
    <div>
      <button id="closeBtn" class="btn btn-brand" type="button">❌ Close</button>
      <button id="exportCsvBtn" class="btn" type="button">⬇️ Exportar CSV</button>
      <button id="printBtn" class="btn" type="button">🖨️ Imprimir</button>
      <button id="exportPdfBtn" class="btn" type="button">📄 Exportar PDF</button>
    </div>
  </header>

  <main>
    <div class="card">
      <h3>Lote más reciente</h3>
      <table aria-label="Último lote">
        <thead>
          <tr>
            <th>Fecha</th><th>Caducidad</th><th>Lote #</th>
            <th>Producto / Ingredientes</th><th>Origen / Proveedor</th>
            <th>Lotes de materias</th><th>Usado en</th><th>Preparado por</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="nowrap" id="latestLotDate"></td>
            <td class="nowrap" id="latestExpDate"></td>
            <td class="nowrap" id="latestLotNumber"></td>
            <td id="producto"></td>
            <td id="origen"></td>
            <td id="lote"></td>
            <td id="usado"></td>
            <td id="chef"></td>
          </tr>
        </tbody>
      </table>

      <h3>Histórico</h3>
      <table aria-label="Histórico de lotes">
        <thead>
          <tr>
            <th>Fecha</th><th>Caducidad</th><th>Lote #</th>
            <th>Producto / Ingredientes</th><th>Origen / Proveedor</th>
            <th>Lotes de materias</th><th>Usado en</th><th>Preparado por</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </main>

  <script src="./config.js"></script>
  <script>
    // --- figure out which key to load ---
    const parts = location.pathname.split('/').filter(Boolean);
    let keyFromPath = parts.pop()?.toUpperCase() || "";

    // if we are at /food/ (no key) or accidentally /food/404, redirect home
    if (!keyFromPath || keyFromPath === "FOOD" || keyFromPath === "404" || keyFromPath === "404.HTML") {
      location.replace('./');
    }

    const keyFromQuery = new URLSearchParams(location.search).get('item')?.toUpperCase();
    const KEY = keyFromQuery || keyFromPath;
    const CONFIG = (window.B05_CONFIGS || {})[KEY];

    if (!CONFIG) {
      location.replace('./');  // go back to main if not found
    }

    // --- extract config ---
    const {
      Food, PREFIX, latestLotNumber, PRODUCTO, ORIGEN, LOTE, USADO, CHEF,
      EXP_DAYS, MONTHS_BACK, USE_DAYS
    } = CONFIG;

    // --- helpers ---
    const fmtES = new Intl.DateTimeFormat('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'});
    function atNoon(d){const x=new Date(d);x.setHours(12,0,0,0);return x;}
    function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
    function mostRecentServiceDay(refDate){
      const y=new Date(refDate);y.setDate(y.getDate()-1);
      while(!USE_DAYS.includes(y.getDay()))y.setDate(y.getDate()-1);
      return atNoon(y);
    }
    function buildDateSeries(latest){
      const start=atNoon(new Date(latest));start.setMonth(start.getMonth()-MONTHS_BACK);
      const d=new Date(latest);d.setDate(d.getDate()-1);const dates=[];
      for(let cur=new Date(d);cur>=start;cur.setDate(cur.getDate()-1)){
        if(USE_DAYS.includes(cur.getDay()))dates.push(atNoon(new Date(cur)));
      }return dates;
    }
    function serialForDate(dateObj){
      const base=new Date(1904,0,1);
      const diff=Math.floor((dateObj-base)/(1000*60*60*24))+1;
      return (diff-44000).toString();
    }

    // --- generate tables ---
    function generate(){
      const latest=mostRecentServiceDay(new Date());
      const exp=addDays(latest,EXP_DAYS);
      document.getElementById('title').textContent=`${Food} – Registro de Trazabilidad – B05`;
      document.getElementById('latestLotDate').textContent=fmtES.format(latest);
      document.getElementById('latestExpDate').textContent=fmtES.format(exp);
      document.getElementById('latestLotNumber').textContent=latestLotNumber;
      document.getElementById('producto').textContent=PRODUCTO;
      document.getElementById('origen').textContent=ORIGEN;
      document.getElementById('lote').textContent=LOTE;
      document.getElementById('usado').textContent=USADO;
      document.getElementById('chef').textContent=CHEF;

      const tbody=document.getElementById('tbody');
      tbody.innerHTML='';
      const series=buildDateSeries(latest);
      series.forEach(dateObj=>{
        const expDate=addDays(dateObj,EXP_DAYS);
        const tr=document.createElement('tr');
        tr.innerHTML=`
          <td class="nowrap">${fmtES.format(dateObj)}</td>
          <td class="nowrap">${fmtES.format(expDate)}</td>
          <td class="nowrap">${PREFIX}${serialForDate(dateObj)}</td>
          <td>${PRODUCTO}</td><td>${ORIGEN}</td>
          <td>${LOTE}</td><td>${USADO}</td><td>${CHEF}</td>`;
        tbody.appendChild(tr);
      });
    }

    // --- buttons ---
    document.getElementById('closeBtn').addEventListener('click',()=>location.href='./');
    document.getElementById('printBtn').addEventListener('click',()=>window.print());
    document.getElementById('exportPdfBtn').addEventListener('click',()=>window.print());
    document.getElementById('exportCsvBtn').addEventListener('click',()=>{
      const tbody=document.querySelector('table[aria-label="Histórico de lotes"] tbody');
      const rows=[["Date","Expiration Date","Lot #","Product / Ingredients","Origin / Supplier","Lot / Batch","Used in","Prepared by"]];
      [...tbody.querySelectorAll('tr')].forEach(tr=>{
        const cells=[...tr.children].map(td=>'"'+(td.textContent||'').replaceAll('"','""')+'"');
        rows.push(cells);
      });
      const csv=rows.map(r=>r.join(',')).join('\n');
      const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      const safeName=(Food||'producto').toLowerCase().replaceAll(' ','_');
      a.href=url;a.download=`B05_traceability_${safeName}_6m.csv`;a.click();
      URL.revokeObjectURL(url);
    });

    generate();
  </script>
</body>
</html>
