<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>B05 – Traceability</title>
  <style>
    :root { --brand:#3A5C1E; --beige:#F1F1E6; }
    html { font-size:12px; }
    body { background:var(--beige); margin:0; font-family:Arial, sans-serif; min-height:100vh; display:flex; flex-direction:column; }
    header { padding:1rem 1.5rem; background:#fff; box-shadow:0 2px 8px rgba(0,0,0,.06); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; position:sticky; top:0; z-index:10; }
    header h1 { color:var(--brand); margin:0; font-weight:800; font-size:1.25rem; }
    .btn { border-radius:.6rem; padding:.45rem .85rem; font-weight:600; cursor:pointer; border:1px solid #e5e7eb; background:#fff; }
    .btn-brand { background:var(--brand); color:#fff; border-color:var(--brand); }
    main { padding:1rem 1.5rem 3rem; flex-grow:1; }
    .card { background:#fff; border-radius:1rem; box-shadow:0 8px 30px rgba(0,0,0,.06); max-width:1100px; margin:0 auto; padding:1rem; overflow-x:auto; }
    h3 { margin:.5rem 0; color:#334155; }
    table { width:100%; border-collapse:collapse; font-size:.9rem; margin-top:.5rem; }
    th, td { padding:.6rem .75rem; text-align:left; border-bottom:1px solid #e2e8f0; vertical-align:top; }
    th { background:#fafafa; font-weight:700; color:#475569; }
    .nowrap { white-space:nowrap; }
    #latestLotDate, #latestExpDate { color:#dc2626; font-weight:700; }
  </style>
</head>
<body>
  <header>
    <h1 id="title">B05 – Trazabilidad</h1>
    <div>
      <button id="closeBtn" class="btn btn-brand" type="button">❌ Cerrar</button>
      <button id="exportCsvBtn" class="btn" type="button">⬇️ Exportar CSV</button>
      <button id="printBtn" class="btn" type="button">🖨️ Imprimir</button>
    </div>
  </header>
  <main id="app"></main>

  <script>
    // ---- Helpers ----
    const fmtES = new Intl.DateTimeFormat('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'});
    const atNoon=d=>{const x=new Date(d);x.setHours(12,0,0,0);return x;}
    const addDays=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x;}
    const qs = new URLSearchParams(location.search);

    function getKeyFromUrl(){
      const parts = location.pathname.split('/').filter(Boolean); // ["food"] or ["food","KEY"]
      let key = (parts[0]==='food' && parts[1]) ? decodeURIComponent(parts[1]).toUpperCase() : '';
      if (qs.get('item')) key = qs.get('item').toUpperCase();
      if (['','FOOD','404','404.HTML','INDEX.HTML'].includes(key)) key = '';
      return key;
    }

    function parseISODate(s){
      const [Y,M,D]=String(s||'').split('-').map(Number);
      if(!Y||!M||!D) return atNoon(new Date(2025,0,1));
      return atNoon(new Date(Y,M-1,D));
    }

    function mostRecentProduction(ref,cfg){
      const step = Number(cfg.DAYS_PRODUCTION);
      const safeStep = Number.isFinite(step) && step>0 ? step : 7; // avoid 0/NaN -> infinite loops
      const anchor = cfg.PROD_ANCHOR ? parseISODate(cfg.PROD_ANCHOR) : parseISODate('2025-01-01');
      const msPerDay=86400000;
      const daysFromAnchor=Math.floor((atNoon(ref)-anchor)/msPerDay);
      const k=Math.floor(daysFromAnchor/safeStep);
      let d=addDays(anchor,k*safeStep);
      if(d.getDay()===1) d=addDays(d,-1); // Monday -> Sunday
      return atNoon(d);
    }

    function buildSeries(latest,cfg){
      const monthsBack = Number(cfg.MONTHS_BACK)||6;
      const stepRaw = Number(cfg.DAYS_PRODUCTION);
      const step = Number.isFinite(stepRaw)&&stepRaw>0 ? stepRaw : 7;
      const start = new Date(latest); start.setMonth(start.getMonth()-monthsBack);
      const arr=[];
      for(let d=new Date(latest); d>=start; d=addDays(d,-step)){
        let dd=new Date(d);
        if(dd.getDay()===1) dd=addDays(dd,-1);
        arr.push(atNoon(dd));
        if (arr.length>2000) break; // hard-guard to avoid runaway
      }
      return arr;
    }

    function renderLanding(){
      const app=document.getElementById('app');
      const keys=Object.keys(window.B05_CONFIGS||{});
      app.innerHTML=`<div class="card"><h3>Escanee un código QR del producto</h3>
      <p><strong>Claves disponibles:</strong></p><ul>${keys.map(k=>`<li><a href="/food/${k}">${k}</a></li>`).join('')}</ul></div>`;
    }

    function renderTrace(cfg){
      const app=document.getElementById('app');
      app.innerHTML=`
        <div class="card">
          <h3>Lote más reciente</h3>
          <table aria-label="Último lote">
            <thead><tr>
              <th>Fecha</th><th>Caducidad</th><th>Duración (Días)</th><th>Lote #</th>
              <th>Producto / Ingredientes</th><th>Origen / Proveedor</th><th>Lotes</th>
              <th>Usado en</th><th>Preparado por</th>
            </tr></thead>
            <tbody>
              <tr id="latestRow">
                <td id="latestLotDate"></td>
                <td id="latestExpDate"></td>
                <td id="latestExpDays"></td>
                <td id="latestLotNumber"></td>
                <td id="producto"></td>
                <td id="origen"></td>
                <td id="lote"></td>
                <td id="usado"></td>
                <td id="chef"></td>
              </tr>
            </tbody>
          </table>

          <h3>Histórico</h3>
          <table aria-label="Histórico de lotes">
            <thead><tr>
              <th>Fecha</th><th>Caducidad</th><th>Duración (Días)</th><th>Lote #</th>
              <th>Producto / Ingredientes</th><th>Origen / Proveedor</th><th>Lotes</th>
              <th>Usado en</th><th>Preparado por</th>
            </tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>`;

      const latest=mostRecentProduction(new Date(),cfg);
      const exp=addDays(latest,cfg.EXP_DAYS);
      document.getElementById('latestLotDate').textContent=fmtES.format(latest);
      document.getElementById('latestExpDate').textContent=fmtES.format(exp);
      document.getElementById('latestExpDays').textContent=cfg.EXP_DAYS;
      document.getElementById('latestLotNumber').textContent=cfg.latestLotNumber;
      document.getElementById('producto').textContent=cfg.PRODUCTO;
      document.getElementById('origen').textContent=cfg.ORIGEN;
      document.getElementById('lote').textContent=cfg.LOTE;
      document.getElementById('usado').textContent=cfg.USADO;
      document.getElementById('chef').textContent=cfg.CHEF;

      const tbody=document.getElementById('tbody');
      const series=buildSeries(latest,cfg);
      series.forEach(d=>{
        const expd=addDays(d,cfg.EXP_DAYS);
        const tr=document.createElement('tr');
        tr.innerHTML=`<td>${fmtES.format(d)}</td><td>${fmtES.format(expd)}</td>
          <td>${cfg.EXP_DAYS}</td><td>${cfg.PREFIX}${Math.floor((d-0)/86400000)}</td>
          <td>${cfg.PRODUCTO}</td><td>${cfg.ORIGEN}</td><td>${cfg.LOTE}</td>
          <td>${cfg.USADO}</td><td>${cfg.CHEF}</td>`;
        tbody.appendChild(tr);
      });
    }

    // ---- Wire buttons ONCE (no re-binding) ----
    document.getElementById('printBtn').addEventListener('click', ()=> window.print(), {once:false});
    document.getElementById('closeBtn').addEventListener('click', ()=> { location.href = '/food/'; });
    document.getElementById('exportCsvBtn').addEventListener('click', ()=> {
      const rows = [[
        "Date","Expiration Date","Duration (Days)","Lot #",
        "Product / Ingredients","Origin / Supplier","Lot / Batch","Used in","Prepared by"
      ]];
      const pushRow = tr => {
        const cells = [...tr.children].map(td => '"' + (td.textContent||'').replaceAll('"','""') + '"');
        rows.push(cells);
      };
      const latestTr = document.getElementById('latestRow');
      if (latestTr) pushRow(latestTr);
      document.querySelectorAll('table[aria-label="Histórico de lotes"] tbody tr').forEach(pushRow);

      const csv = rows.map(r=>r.join(',')).join('\n');
      const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const safeName = (document.getElementById('title').textContent || 'producto').toLowerCase().replaceAll(' ', '_');
      a.href = url; a.download = `B05_traceability_${safeName}_with_latest.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url), 500);
    });

    function boot(){
      const key=getKeyFromUrl();
      const cfg=(window.B05_CONFIGS||{})[key];
      if(!key) return renderLanding();
      if(!cfg) return (document.getElementById('app').innerHTML='<div class="card">No encontrado</div>');
      document.getElementById('title').textContent = `${cfg.Food} – Registro de Trazabilidad – B05`;
      renderTrace(cfg);
    }

    // Load config then boot
    const s=document.createElement('script');
    s.src='/food/config.js?v='+Date.now();
    s.onload=boot;
    s.onerror=()=>{ document.getElementById('app').innerHTML='<div class="card">No se pudo cargar config.js</div>'; };
    document.head.appendChild(s);
  </script>
</body>
</html>
