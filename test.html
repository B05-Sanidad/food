<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B05 Sanidad – Test Page</title>
  <style>
    :root {
      --brand: #3A5C1E;
      --beige: #F1F1E6;
    }
    body {
      font-family: Arial, sans-serif;
      background: var(--beige);
      color: var(--brand);
      margin: 0;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    h1 {
      font-size: 2rem;
      color: var(--brand);
      margin-bottom: 0.5rem;
    }
    p {
      color: #333;
      font-size: 1rem;
    }
    .box {
      margin-top: 1.5rem;
      padding: 1rem 2rem;
      border: 2px solid var(--brand);
      border-radius: 12px;
      background: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    footer {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #777;
    }
  </style>
</head>
<body>
  <h1>✅ B05 Sanidad Test Page</h1>
  <p>If you can read this, your GitHub Pages is working!</p>

  <div class="box">
    <p><strong>Repository:</strong> <span id="repo-name"></span></p>
    <p><strong>Published from:</strong> <code>main / root</code></p>
  </div>

  <footer>© 2025 B05 Sanidad – Test Deployment</footer>

  <script>
    // Automatically love detect repo name from URL
    const pathParts = window.location.pathname.split('/');
    const repoName = pathParts[1] || 'unknown';
    document.getElementById('repo-name').textContent = repoName;
  </script>
</body>
</html>
