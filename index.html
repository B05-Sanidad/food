<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>B05 – Trazabilidad</title>
  <meta name="color-scheme" content="light only">
  <style>
    :root { --brand:#3A5C1E; --beige:#F1F1E6; }
    html { font-size:12px; }
    body { background:var(--beige); margin:0; font-family:Arial, sans-serif; min-height:100vh; display:flex; flex-direction:column; }
    header { padding:1rem 1.5rem; background:#fff; box-shadow:0 2px 8px rgba(0,0,0,.06); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; position:sticky; top:0; z-index:10; }
    header h1 { color:var(--brand); margin:0; font-weight:800; font-size:1.25rem; }
    .toolbar { display:flex; gap:.5rem; flex-wrap:wrap; align-items:center; }
    .btn { border-radius:.6rem; padding:.45rem .85rem; font-weight:600; cursor:pointer; border:1px solid #e5e7eb; background:#fff; }
    .btn-brand { background:var(--brand); color:#fff; border-color:var(--brand); }
    main { padding:1rem 1.5rem 3rem; flex-grow:1; }
    .card { background:#fff; border-radius:1rem; box-shadow:0 8px 30px rgba(0,0,0,.06); max-width:1200px; margin:0 auto; padding:1rem; overflow-x:auto; }
    .muted { color:#64748b; }
    #diag { margin: 8px 16px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
    #diag.ok { color:#065f46; }
    #diag.bad { color:#991b1b; }
    pre.err { white-space:pre-wrap; background:#fee2e2; border:1px solid #ef4444; color:#991b1b; padding:10px; border-radius:8px; }
  </style>
</head>
<body>
  <header>
    <h1 id="title">B05 – Trazabilidad</h1>
    <div class="toolbar">
      <a id="homeBtn" class="btn" href="./">🏠 Resumen</a>
      <a id="expiredBtn" class="btn" href="?view=expired">🚨 Caducados</a>
      <button id="exportCsvBtn" class="btn" type="button">⬇️ Exportar CSV</button>
      <button id="printBtn" class="btn" type="button">🖨️ Imprimir</button>
      <button id="resetOverridesBtn" class="btn" type="button" title="Borrar regeneraciones locales">🧹 Reset</button>
      <button id="closeBtn" class="btn btn-brand" type="button">❌ Cerrar</button>
    </div>
  </header>

  <div id="diag" class="muted">cargando…</div>
  <main id="app"></main>

  <script>
    // Global error box
    window.addEventListener('error', function (e) {
      const pre = document.createElement('pre');
      pre.className = 'err';
      pre.textContent = (e.error && e.error.stack) ? e.error.stack : e.message;
      document.getElementById('app').prepend(pre);
      const d = document.getElementById('diag');
      d.className='bad'; d.textContent = '⚠️ Error en JS — ver recuadro rojo.';
    });
  </script>

  <!-- Load config first -->
  <script src="config.js" defer onload="(function(){var d=document.getElementById('diag');var ok= !!(window.B05_CONFIGS && Object.keys(window.B05_CONFIGS).length); d.className = ok? 'ok' : 'bad'; d.textContent = ok? ('✅ config.js OK – '+Object.keys(window.B05_CONFIGS).length+' items') : '⚠️ config.js cargado pero vacío o sin window.B05_CONFIGS'; })()" onerror="(function(){var d=document.getElementById('diag'); d.className='bad'; d.textContent='❌ No se pudo cargar config.js (404/CORS)'; })()"></script>
  <!-- App logic -->
  <script src="app.js?v=1.0.3" defer></script>
</body>
</html>
